is_wsl: false

appimage_install_dir: "{{ ansible_env.HOME }}/.local/bin"

apt_packages_prereqs:
  - name: ca-certificates
  - name: curl
  - name: python3-debian

external_apt_repositories:
  - name: github-cli
    signed_by: https://cli.github.com/packages/githubcli-archive-keyring.gpg
    uris: https://cli.github.com/packages
    suites: stable
    components: main
    architectures: "{{ deb_architecture }}"
  # Debian 13's archive ships Node.js 20, too old for current pnpm (needs
  # >= 22.13); mirror the real vars and pull Node 22 from NodeSource.
  - name: nodesource
    signed_by: https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key
    uris: https://deb.nodesource.com/node_22.x
    suites: nodistro
    components: main
    architectures: "{{ deb_architecture }}"

apt_packages:
  - name: gh
  - name: git
  - name: git-lfs
  - name: jq
  # NodeSource nodejs bundles npm
  - name: nodejs
  - name: pipx

flatpak_packages: []

powershell_modules: []

pipx_packages:
  - uv

uv_tools:
  - ruff

npm_global_packages:
  - bun
  - pnpm

pnpm_global_packages:
  - json

bun_global_packages:
  - cowsay
  # Regression guard (19e6c60): a failing global install must not abort
  # the play, and must not report changed on reruns
  - dms-ci-package-that-does-not-exist

dotnet_tools: []

vscode_extensions: []

appimage_packages:
  - name: appimagetool
    url: "https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage"
    comment: "AppImage packaging tool (CI fixture)"
    categories: "Development;"
    supported_architectures:
      - amd64

git_user_email: "ci-test@example.com"
git_user_name: "CI Test User"

# Sentinel files let verify.sh prove the commands actually ran; creates
# keeps reruns idempotent (the task skips once the file exists)
custom_commands_user:
  - command: touch "$HOME/.dms-ci-user-command-ran"
    description: Write user custom-command sentinel
    creates: "{{ ansible_env.HOME }}/.dms-ci-user-command-ran"

custom_commands_elevated:
  - command: touch /etc/dms-ci-elevated-command-ran
    description: Write elevated custom-command sentinel
    creates: /etc/dms-ci-elevated-command-ran

custom_script: ""
