choco_packages:
  - name: bun
  - name: git
    parameters: /WindowsTerminal /NoShellIntegration
  - name: jq
  - name: pnpm
  - name: uv

powershell_modules:
  - Pester

windows_powershell_modules:
  - posh-git

pipx_packages:
  - cowsay

uv_tools:
  - ruff

npm_global_packages:
  - semver

pnpm_global_packages:
  - json

bun_global_packages:
  - cowsay

dotnet_tools:
  - dotnetsay

vscode_extensions: []

git_user_email: "ci-test@example.com"
git_user_name: "CI Test User"

# Sentinel file lets verify.ps1 prove the command actually ran; -Force
# keeps the rerun-based idempotency check green
custom_commands:
  - New-Item -ItemType File -Path "$env:USERPROFILE\.dms-ci-custom-command-ran" -Force | Out-Null

custom_script: ""
