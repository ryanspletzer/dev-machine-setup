is_wsl: false

appimage_install_dir: "{{ ansible_env.HOME }}/.local/bin"

dnf_packages_prereqs:
  - name: ca-certificates
  - name: curl

external_dnf_repositories:
  - name: gh-cli
    description: packages for the GitHub CLI
    baseurl: https://cli.github.com/packages/rpm
    gpgkey: https://cli.github.com/packages/githubcli-archive-keyring.asc
    gpgcheck: true

dnf_packages:
  - name: gh
  - name: git
  - name: git-lfs
  - name: jq
  - name: nodejs
  - name: npm
  - name: pipx

flatpak_packages: []

powershell_modules: []

pipx_packages:
  - uv

uv_tools:
  - ruff

npm_global_packages:
  - bun
  - pnpm

pnpm_global_packages:
  - json

bun_global_packages:
  - cowsay

dotnet_tools: []

vscode_extensions: []

appimage_packages:
  - name: appimagetool
    url: "https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage"
    comment: "AppImage packaging tool (CI fixture)"
    categories: "Development;"
    supported_architectures:
      - x86_64

git_user_email: "ci-test@example.com"
git_user_name: "CI Test User"

custom_commands_user:
  - command: echo "CI test user command"
    description: CI test user command

custom_commands_elevated:
  - command: echo "CI test elevated command"
    description: CI test elevated command

custom_script: ""
