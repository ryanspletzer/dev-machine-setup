install_rosetta: false

homebrew_taps:
  - hashicorp/tap

homebrew_casks:
  - iterm2
  - visual-studio-code

homebrew_formulae:
  - bun
  - git-lfs
  - jq
  - pnpm
  - uv

powershell_modules: []

pipx_packages:

uv_tools:
  - ruff

npm_global_packages:
  - semver

pnpm_global_packages:
  - json

bun_global_packages:
  - cowsay

dotnet_tools:
  - dotnetsay

vscode_extensions:
  - codezombiech.gitignore

git_user_email: "ci-test@example.com"
git_user_name: "CI Test User"

# Mapping form exercises the command/creates entry shape: sentinel files
# let verify.sh prove the commands ran, and creates keeps reruns
# idempotent (the task skips once the file exists)
custom_commands_user:
  - command: touch "$HOME/.dms-ci-user-command-ran"
    creates: "{{ ansible_env.HOME }}/.dms-ci-user-command-ran"

custom_commands_elevated:
  - command: touch /etc/dms-ci-elevated-command-ran
    creates: /etc/dms-ci-elevated-command-ran

custom_script: ""
