name: Canary

# Weekly run of each platform's REAL vars.yaml (the PR pipeline only
# exercises the minimal fixtures in tests/, so a green PR never proves the
# production package lists still install). Catches upstream breakage:
# renamed Homebrew formulae, moved APT/DNF repos, dead AppImage URLs,
# removed Chocolatey packages. Non-blocking: failures notify, but never
# gate PRs.

permissions:
  contents: read

on:
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC
  workflow_dispatch:

jobs:
  canary-macos:
    runs-on: macos-latest
    timeout-minutes: 300
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run setup with production vars.yaml
        working-directory: macOS
        run: |
          chmod 700 ./setup.sh
          ./setup.sh -c -e ci-test@example.com -n "CI Test User"

  canary-ubuntu:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run setup with production vars.yaml
        working-directory: ubuntu
        run: |
          chmod 700 ./setup.sh
          ./setup.sh -c -e ci-test@example.com -n "CI Test User"

  canary-fedora:
    runs-on: ubuntu-latest
    container: fedora:43
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install container prerequisites
        run: dnf install -y sudo findutils

      - name: Run setup with production vars.yaml
        working-directory: fedora
        run: |
          chmod 700 ./setup.sh
          ./setup.sh -c -e ci-test@example.com -n "CI Test User"

  # ARM canaries run the real vars.yaml on aarch64 — the only place that
  # proves every non-arch-gated package and repo actually exists for
  # aarch64/arm64 (fixtures on the PR ARM jobs only prove skip mechanics).
  canary-fedora-arm:
    runs-on: ubuntu-24.04-arm
    container: fedora:43
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install container prerequisites
        run: dnf install -y sudo findutils

      - name: Run setup with production vars.yaml
        working-directory: fedora
        run: |
          chmod 700 ./setup.sh
          ./setup.sh -c -e ci-test@example.com -n "CI Test User"

  canary-debian:
    runs-on: ubuntu-latest
    container: debian:13
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install container prerequisites
        run: apt-get update && apt-get install -y sudo findutils

      - name: Run setup with production vars.yaml
        working-directory: debian
        run: |
          chmod 700 ./setup.sh
          ./setup.sh -c -e ci-test@example.com -n "CI Test User"

  canary-debian-arm:
    runs-on: ubuntu-24.04-arm
    container: debian:13
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install container prerequisites
        run: apt-get update && apt-get install -y sudo findutils

      - name: Run setup with production vars.yaml
        working-directory: debian
        run: |
          chmod 700 ./setup.sh
          ./setup.sh -c -e ci-test@example.com -n "CI Test User"

  canary-windows:
    runs-on: windows-latest
    timeout-minutes: 300
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # The production choco list needs more free space than the runner
      # image ships with (~14 GB): three canary runs died with the runner
      # agent itself crashing on a full C: drive. Delete the largest
      # preinstalled toolchains this job never uses.
      - name: Free disk space
        shell: pwsh
        run: |
          Get-PSDrive -Name C | Format-Table -Property Used, Free -AutoSize
          $targets = @(
            'C:\Android'                          # Android SDK, ~12 GB
            'C:\hostedtoolcache\windows\CodeQL'   # CodeQL bundle, ~5 GB
            'C:\selenium'
            'C:\SeleniumWebDrivers'
          )
          foreach ($target in $targets) {
            if (Test-Path $target) {
              Write-Host "Removing $target"
              Remove-Item -Recurse -Force $target -ErrorAction SilentlyContinue
            }
          }
          Get-PSDrive -Name C | Format-Table -Property Used, Free -AutoSize

      # Correctness-driven exclusions, not size-driven: run-4 timing showed
      # the big packages are cheap (office 4m, SSMS 9.5m); these four cannot
      # install on a hosted runner or are broken upstream.
      - name: Exclude packages that cannot install on a hosted runner
        shell: pwsh
        run: |
          $exclude = @(
            'gnupg'            # installer hangs headless until choco's 45-min timeout
            'nvm'              # its nvm.install dependency hangs the same way
            'awssamcli'        # MSI error 1603 on the runner image (pending-reboot class)
            'windows-app-sdk'  # upstream checksum mismatch as of 2026-07-15; re-include when fixed
          )
          $out = New-Object System.Collections.Generic.List[string]
          $skip = $false
          foreach ($line in Get-Content windows/vars.yaml) {
            if ($line -match '^  - name: (\S+)') { $skip = $exclude -contains $Matches[1] }
            elseif ($line -match '^\S') { $skip = $false }
            if (-not $skip) { $out.Add($line) }
          }
          Set-Content -Path windows/vars.yaml -Value $out
          Write-Host "Excluded: $($exclude -join ', ')"

      # Windows PowerShell 5.1 — same rationale as the integration job:
      # a fresh Windows 11 machine bootstraps from stock 5.1.
      - name: Run setup with production vars.yaml
        working-directory: windows
        shell: powershell
        run: .\setup.ps1 -e ci-test@example.com -n "CI Test User"

      - name: Report disk space after setup
        if: always()
        shell: pwsh
        run: Get-PSDrive -Name C | Format-Table -Property Used, Free -AutoSize
